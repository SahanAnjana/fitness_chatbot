<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Chatbot</title>
</head>
<body>
    <h1>Welcome to the Fitness Chatbot!</h1>
    <p>You can ask me any questions related to workout routines, dietary advice, etc.</p>
    <p>Type 'exit' to end the conversation.</p>
    <form action="/submit" method="post">
        <input type="text" name="user_input" placeholder="Ask your question...">
        <button type="submit">Submit</button>
    </form>
    <div id="response"></div>
</body>
</html>
